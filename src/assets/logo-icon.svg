<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 320" fill="none">
  <defs>
    <linearGradient id="body-g" x1="20" y1="140" x2="236" y2="310" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#c4b5fd"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>

    <linearGradient id="shackle-g" x1="50" y1="10" x2="206" y2="140" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#e0e7ff"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>

    <radialGradient id="inner-glow" cx="128" cy="222" r="60" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ede9fe" stop-opacity="0.85"/>
      <stop offset="50%" stop-color="#818cf8" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>

    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="drop" x="-10%" y="-5%" width="125%" height="125%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#4c1d95" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Lock group -->
  <g filter="url(#drop)">
    <!-- Shackle -->
    <path d="M52 142 V88 C52 18 204 18 204 88 V142"
          stroke="url(#shackle-g)" stroke-width="34" stroke-linecap="round"/>

    <!-- Lock body -->
    <rect x="20" y="142" width="216" height="162" rx="28" fill="url(#body-g)"/>
  </g>

  <!-- Body highlight -->
  <rect x="28" y="148" width="200" height="5" rx="2.5" fill="white" opacity="0.2"/>

  <!-- Shackle highlight -->
  <path d="M60 140 V92 C60 28 196 28 196 92 V140"
        fill="none" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.3"/>

  <!-- Keyhole glow (behind) -->
  <circle cx="128" cy="222" r="50" fill="url(#inner-glow)"/>

  <!-- Keyhole with bloom -->
  <g filter="url(#glow)">
    <circle cx="128" cy="214" r="15" fill="#ede9fe"/>
    <path d="M120 224 L117 262 Q117 272 128 272 Q139 272 139 262 L136 224" fill="#ede9fe"/>
  </g>

  <!-- Bright center -->
  <circle cx="128" cy="214" r="6" fill="white"/>
</svg>
